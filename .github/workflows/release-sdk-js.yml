name: "release-sdk-js"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/sdk/javascript/**"
      - ".github/workflows/release-sdk-js.yml"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24" # specify the version of Node.js you want to use
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: "src/sdk/javascript/"
        run: npm install

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: "src/sdk/javascript/"
        run: npm publish --access public --registry=https://registry.npmjs.org
