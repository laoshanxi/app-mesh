name: "security-coverity"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "!src/sdk/**"
      - .github/workflows/security-coverity.yml

permissions: # added using https://github.com/step-security/secure-workflows
  contents: read

env:
  APPMESH_VERSION: "2.2.1"
  COVERITY_PROJECT: "laoshanxi/app-mesh"

jobs:
  coverity-cpp-code-scan:
    runs-on: ubuntu-latest
    container: laoshanxi/appmesh:build_ubuntu22

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

      - name: Checkout Github code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cmake init with Debug mode
        run: |
          mkdir build
          cd build
          export OPENSSL_ROOT_DIR=/usr/local/ssl
          cmake -DCMAKE_BUILD_TYPE=Debug ..

      - name: URL encode Coverity project name
        id: coverity-project
        shell: bash
        run: |
          project="${COVERITY_PROJECT//\//%2F}"
          project="${project// /%20}"
          echo "project=${project}" >> "$GITHUB_OUTPUT"

      - name: Lookup Coverity Build Tool hash
        id: coverity-cache-lookup
        shell: bash
        env:
          TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
        run: |
          response_file="$(mktemp)"
          http_code=$(curl --silent --show-error --location \
            --output "$response_file" \
            --write-out "%{http_code}" \
            https://scan.coverity.com/download/cxx/linux64 \
            --data "token=${TOKEN}&project=${{ steps.coverity-project.outputs.project }}&md5=1")
          hash="$(tr -d '\r\n' < "$response_file")"

          if [[ "$http_code" != "200" || ! "$hash" =~ ^[0-9a-fA-F]{32}$ ]]; then
            echo "::error::Coverity build tool hash lookup failed (HTTP ${http_code}). Check COVERITY_SCAN_TOKEN and the Coverity project registration for ${COVERITY_PROJECT}."
            head -c 1000 "$response_file" | sed 's/^/Coverity response: /'
            exit 1
          fi

          echo "hash=${hash}" >> "$GITHUB_OUTPUT"

      - name: Cache Coverity Build Tool
        id: cov-build-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: build/cov-analysis
          key: cov-build-cxx-linux64-${{ steps.coverity-cache-lookup.outputs.hash }}

      - name: Download Coverity Build Tool
        if: steps.cov-build-cache.outputs.cache-hit != 'true'
        working-directory: build
        env:
          TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
        run: |
          curl --fail --silent --show-error --location \
            --output cov-analysis.tar.gz \
            https://scan.coverity.com/download/cxx/linux64 \
            --data "token=${TOKEN}&project=${{ steps.coverity-project.outputs.project }}"
          mkdir cov-analysis
          tar -xzf cov-analysis.tar.gz --strip 1 -C cov-analysis
          test -x cov-analysis/bin/cov-build

      - name: Build with cov-build
        working-directory: build
        run: |
          export PATH="${PWD}/cov-analysis/bin:${PATH}"
          cov-build --dir cov-int make

      - name: Archive Coverity results
        working-directory: build
        run: tar -czf cov-int.tgz cov-int

      - name: Submit Coverity results
        working-directory: build
        env:
          TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            --form token="${TOKEN}" \
            --form email="${{ secrets.COVERITY_SCAN_EMAIL }}" \
            --form file=@cov-int.tgz \
            --form version="${{ env.APPMESH_VERSION }}" \
            --form description="coverity-scan-action ${{ github.repository }} / ${{ github.ref }}" \
            "https://scan.coverity.com/builds?project=${{ steps.coverity-project.outputs.project }}"
