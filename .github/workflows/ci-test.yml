name: "ci-test"

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci-test.yml
  workflow_run:
    workflows: ["release-linux"]
    types: [completed]

env:
  APPMESH_VERSION: "2.2.1"

permissions: # added using https://github.com/step-security/secure-workflows
  contents: read

jobs:
  ci-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

      - name: Configure host for daemon coredumps
        run: |
          # Kernel writes core files via the HOST's core_pattern even for containerized processes.
          # Stop the interceptors that pipe cores into apport/systemd-coredump (where the test
          # script in the container cannot reach them), then point cores at a bind-mounted dir.
          sudo systemctl stop apport.service 2>/dev/null || true
          sudo systemctl mask apport.service 2>/dev/null || true
          sudo systemctl stop systemd-coredump.socket 2>/dev/null || true
          sudo systemctl mask systemd-coredump.socket 2>/dev/null || true
          sudo mkdir -p /tmp/host-cores
          sudo chmod 1777 /tmp/host-cores
          sudo sh -c 'echo "/tmp/host-cores/core.%e.%p.%t" > /proc/sys/kernel/core_pattern'
          sudo sysctl -w fs.suid_dumpable=2 || true
          sudo sysctl -w kernel.core_uses_pid=1 || true
          echo "host core_pattern: $(cat /proc/sys/kernel/core_pattern)"
          echo "host suid_dumpable: $(cat /proc/sys/fs/suid_dumpable)"
          # Fail loud if an interceptor reinstalled itself
          test "$(cat /proc/sys/kernel/core_pattern)" = "/tmp/host-cores/core.%e.%p.%t"

      - name: test ubuntu:22
        env:
          OS_TAG: ubuntu22
        run: |
          docker run --rm -e OS_TAG -e APPMESH_BaseConfig_LogLevel=DEBUG \
            -v ${{ github.workspace }}:/work \
            -v /tmp/host-cores:/cores \
            --ulimit core=-1 \
            --cap-add SYS_PTRACE \
            --entrypoint=bash \
            ubuntu:22.04 \
            -c '
            # Always tail server.log on any exit (success or failure) so CI logs
            # always contain the daemon`s last words, even if the structured
            # dump-only path bails out early.
            # Tail server.log only on non-zero exit, for failed-run diagnostics.
            trap '"'"'rc=$?; [ $rc -ne 0 ] && { echo "===== EXIT TRAP (rc=$rc): server.log tail ====="; tail -200 /opt/appmesh/work/server.log 2>&1 || true; echo "===== END server.log tail ====="; }'"'"' EXIT

            apt update
            apt install -y wget iputils-ping gdb
            wget --quiet --no-check-certificate https://github.com/laoshanxi/app-mesh/releases/download/${{ env.APPMESH_VERSION }}/appmesh_2.2.1_gcc_11_glibc_2.35_x86_64.deb
            apt install -y ./appmesh_*.deb

            ulimit -c unlimited

            # start appmesh
            /opt/appmesh/script/appmesh.initd.sh start
            sleep 5
            appm ls
            appm resource

            appm logon -U admin -X admin123 || true
            appm log -L DEBUG || true
            appm loginfo || true

            apt install -y python3 python3-pip
            python3 -m pip install --upgrade appmesh pyotp
            bash /work/script/run_python_test_with_debug.sh \
              /work/src/sdk/python/test/test_appmesh_client.py \
              /work/src/sdk/python/test/test_workflow_engine.py \
              /work/src/sdk/python/sample.py

            # test appmesh golang sdk
            bash /work/script/bootstrap/install_golang.sh
            cd /work/src/sdk/go
            /usr/local/go/bin/go test -v || {
                bash /work/script/run_python_test_with_debug.sh --dump-only "go test failed"
                exit 1
            }

            # test appmesh rust cli + sdk
            bash /work/script/bootstrap/install_rust.sh
            cd /work/src/cli
            CARGO_TARGET_DIR=/tmp/cargo-target-ubuntu22 cargo test --test remote_test -- --ignored --test-threads=1
            '

      - name: test ubuntu:24
        env:
          OS_TAG: ubuntu24
        run: |
          docker run --rm -e OS_TAG -e APPMESH_BaseConfig_LogLevel=DEBUG \
            -v ${{ github.workspace }}:/work \
            -v /tmp/host-cores:/cores \
            --ulimit core=-1 \
            --cap-add SYS_PTRACE \
            --entrypoint=bash \
            ubuntu:24.04 \
            -c '
            # Tail server.log only on non-zero exit, for failed-run diagnostics.
            trap '"'"'rc=$?; [ $rc -ne 0 ] && { echo "===== EXIT TRAP (rc=$rc): server.log tail ====="; tail -200 /opt/appmesh/work/server.log 2>&1 || true; echo "===== END server.log tail ====="; }'"'"' EXIT

            apt update
            apt install -y wget iputils-ping gdb
            wget --quiet --no-check-certificate https://github.com/laoshanxi/app-mesh/releases/download/${{ env.APPMESH_VERSION }}/appmesh_2.2.1_gcc_13_glibc_2.39_x86_64.deb
            apt install -y ./appmesh_*.deb

            ulimit -c unlimited

            # start appmesh
            /opt/appmesh/script/appmesh.initd.sh start
            sleep 5
            appm ls
            appm resource

            appm logon -U admin -X admin123 || true
            appm log -L DEBUG || true
            appm loginfo || true

            # test appmesh python sdk FIRST — Python wrapper captures full daemon
            # diagnostics on crash (backtrace / dmesg / server.log).
            apt install -y python3 python3-pip
            python3 -m pip install --break-system-packages --upgrade appmesh pyotp
            bash /work/script/run_python_test_with_debug.sh \
              /work/src/sdk/python/test/test_appmesh_client.py \
              /work/src/sdk/python/test/test_workflow_engine.py \
              /work/src/sdk/python/sample.py

            # test appmesh golang sdk
            bash /work/script/bootstrap/install_golang.sh
            cd /work/src/sdk/go
            /usr/local/go/bin/go test -v || {
                bash /work/script/run_python_test_with_debug.sh --dump-only "go test failed"
                exit 1
            }

            # test appmesh rust cli + sdk
            bash /work/script/bootstrap/install_rust.sh
            cd /work/src/cli
            CARGO_TARGET_DIR=/tmp/cargo-target-ubuntu24 cargo test --test remote_test -- --ignored --test-threads=1
            '

      - name: test ubuntu:18
        env:
          OS_TAG: ubuntu18
        run: |
          docker run --rm -e OS_TAG -e APPMESH_BaseConfig_LogLevel=DEBUG \
            -v ${{ github.workspace }}:/work \
            -v /tmp/host-cores:/cores \
            --ulimit core=-1 \
            --cap-add SYS_PTRACE \
            --entrypoint=bash \
            ubuntu:18.04 \
            -c '
            # Tail server.log only on non-zero exit, for failed-run diagnostics.
            trap '"'"'rc=$?; [ $rc -ne 0 ] && { echo "===== EXIT TRAP (rc=$rc): server.log tail ====="; tail -200 /opt/appmesh/work/server.log 2>&1 || true; echo "===== END server.log tail ====="; }'"'"' EXIT

            apt update
            apt install -y wget iputils-ping gdb
            wget --quiet --no-check-certificate https://github.com/laoshanxi/app-mesh/releases/download/${{ env.APPMESH_VERSION }}/appmesh_2.2.1_gcc_7_glibc_2.27_x86_64.deb
            apt install -y ./appmesh_*.deb

            ulimit -c unlimited

            # start appmesh
            /opt/appmesh/script/appmesh.initd.sh start
            sleep 5
            appm ls
            appm resource

            appm logon -U admin -X admin123 || true
            appm log -L DEBUG || true
            appm loginfo || true

            apt install -y python3 python3-pip
            python3 -m pip install --upgrade appmesh pyotp
            bash /work/script/run_python_test_with_debug.sh \
              /work/src/sdk/python/test/test_appmesh_client.py \
              /work/src/sdk/python/test/test_workflow_engine.py \
              /work/src/sdk/python/sample.py

            # test appmesh golang sdk
            bash /work/script/bootstrap/install_golang.sh
            cd /work/src/sdk/go
            /usr/local/go/bin/go test -v || {
                bash /work/script/run_python_test_with_debug.sh --dump-only "go test failed"
                exit 1
            }

            # test appmesh rust cli + sdk
            bash /work/script/bootstrap/install_rust.sh
            cd /work/src/cli
            CARGO_TARGET_DIR=/tmp/cargo-target-ubuntu18 cargo test --test remote_test -- --ignored --test-threads=1
            '

      - name: test centos:7
        env:
          OS_TAG: centos7
        run: |
          docker run --rm -e OS_TAG -e APPMESH_BaseConfig_LogLevel=DEBUG \
            -v ${{ github.workspace }}:/work \
            -v /tmp/host-cores:/cores \
            --ulimit core=-1 \
            --cap-add SYS_PTRACE \
            --entrypoint=bash \
            centos:7 \
            -c '
            # Tail server.log only on non-zero exit, for failed-run diagnostics.
            trap '"'"'rc=$?; [ $rc -ne 0 ] && { echo "===== EXIT TRAP (rc=$rc): server.log tail ====="; tail -200 /opt/appmesh/work/server.log 2>&1 || true; echo "===== END server.log tail ====="; }'"'"' EXIT

            # centos 7
            cp -a /etc/yum.repos.d /etc/yum.repos.d.backup
            rm -f /etc/yum.repos.d/*.repo
            curl -o /etc/yum.repos.d/CentOS-Base.repo http://mirrors.aliyun.com/repo/Centos-7.repo
            yum clean all
            yum makecache

            yum install -y https://github.com/laoshanxi/app-mesh/releases/download/${{ env.APPMESH_VERSION }}/appmesh_2.2.1_gcc_4.8.5_glibc_2.17_x86_64.rpm
            yum install -y gdb

            ulimit -c unlimited

            # start appmesh
            /opt/appmesh/script/appmesh.initd.sh start
            sleep 5
            appm ls
            appm resource

            appm logon -U admin -X admin123 || true
            appm log -L DEBUG || true
            appm loginfo || true

            # test appmesh python sdk FIRST — Python wrapper captures full daemon
            # diagnostics on crash (backtrace / dmesg / server.log).
            yum install -y python3 python3-pip
            python3 -m pip install --upgrade appmesh pyotp
            bash /work/script/run_python_test_with_debug.sh \
              /work/src/sdk/python/test/test_appmesh_client.py \
              /work/src/sdk/python/test/test_workflow_engine.py \
              /work/src/sdk/python/sample.py

            # test appmesh golang sdk
            yum install -y wget
            bash /work/script/bootstrap/install_golang.sh
            cd /work/src/sdk/go
            /usr/local/go/bin/go test -v || {
                bash /work/script/run_python_test_with_debug.sh --dump-only "go test failed"
                exit 1
            }

            # test appmesh rust cli + sdk
            bash /work/script/bootstrap/install_rust.sh
            cd /work/src/cli
            CARGO_TARGET_DIR=/tmp/cargo-target-centos7 cargo test --test remote_test -- --ignored --test-threads=1
            '
