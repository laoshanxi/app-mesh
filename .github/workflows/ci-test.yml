name: "ci-test"

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci-test.yml
  workflow_run:
    workflows: ["release-linux"]
    types: [completed]

env:
  APPMESH_VERSION: "2.2.1"

permissions: # added using https://github.com/step-security/secure-workflows
  contents: read

jobs:
  ci-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2
        with:
          egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

      - name: Configure host for daemon coredumps
        run: |
          # Kernel writes core files via the HOST's core_pattern even for containerized processes.
          # Stop the interceptors that pipe cores into apport/systemd-coredump (where the test
          # script in the container cannot reach them), then point cores at a bind-mounted dir.
          sudo systemctl stop apport.service 2>/dev/null || true
          sudo systemctl mask apport.service 2>/dev/null || true
          sudo systemctl stop systemd-coredump.socket 2>/dev/null || true
          sudo systemctl mask systemd-coredump.socket 2>/dev/null || true
          sudo mkdir -p /tmp/host-cores
          sudo chmod 1777 /tmp/host-cores
          sudo sh -c 'echo "/tmp/host-cores/core.%e.%p.%t" > /proc/sys/kernel/core_pattern'
          sudo sysctl -w fs.suid_dumpable=2 || true
          sudo sysctl -w kernel.core_uses_pid=1 || true
          echo "host core_pattern: $(cat /proc/sys/kernel/core_pattern)"
          echo "host suid_dumpable: $(cat /proc/sys/fs/suid_dumpable)"
          # Fail loud if an interceptor reinstalled itself
          test "$(cat /proc/sys/kernel/core_pattern)" = "/tmp/host-cores/core.%e.%p.%t"

      - name: test ubuntu:22
        env:
          OS_TAG: ubuntu22
        run: |
          docker run --rm -e OS_TAG \
            -v ${{ github.workspace }}:/work \
            -v /tmp/host-cores:/cores \
            --ulimit core=-1 \
            --cap-add SYS_PTRACE \
            --entrypoint=bash \
            ubuntu:22.04 \
            -c '
            apt update
            apt install -y wget iputils-ping gdb
            wget --quiet --no-check-certificate https://github.com/laoshanxi/app-mesh/releases/download/${{ env.APPMESH_VERSION }}/appmesh_2.2.1_gcc_11_glibc_2.35_x86_64.deb
            apt install -y ./appmesh_*.deb

            cp -a /opt/appmesh/bin/appsvc "/cores/appsvc.${OS_TAG}.bin" || true

            # Wrap the daemon with gdb so every crash auto-prints a full backtrace.
            bash /work/script/wrap_daemon_with_gdb.sh "$OS_TAG"

            ulimit -c unlimited

            # start appmesh
            /opt/appmesh/script/appmesh.initd.sh start
            sleep 5
            appc ls
            appc resource

            # test appmesh golang sdk
            apt install -y wget
            GO_ARCH=amd64
            GO_VER=1.25.3
            wget https://golang.org/dl/go${GO_VER}.linux-${GO_ARCH}.tar.gz >/dev/null 2>&1
            tar -C /usr/local -xzf go${GO_VER}.linux-${GO_ARCH}.tar.gz
            cd /work/src/sdk/go
            /usr/local/go/bin/go test -v

            # test appmesh python sdk
            apt install -y python3 python3-pip
            python3 -m pip install --upgrade appmesh pyotp
            bash /work/script/run_python_test_with_debug.sh /work/src/sdk/python/test/test_appmesh_client.py
            python3 /work/src/sdk/python/sample.py
            '

      - name: test ubuntu:24
        env:
          OS_TAG: ubuntu24
        run: |
          docker run --rm -e OS_TAG \
            -v ${{ github.workspace }}:/work \
            -v /tmp/host-cores:/cores \
            --ulimit core=-1 \
            --cap-add SYS_PTRACE \
            --entrypoint=bash \
            ubuntu:24.04 \
            -c '
            apt update
            apt install -y wget iputils-ping gdb
            wget --quiet --no-check-certificate https://github.com/laoshanxi/app-mesh/releases/download/${{ env.APPMESH_VERSION }}/appmesh_2.2.1_gcc_13_glibc_2.39_x86_64.deb
            apt install -y ./appmesh_*.deb

            cp -a /opt/appmesh/bin/appsvc "/cores/appsvc.${OS_TAG}.bin" || true
            bash /work/script/wrap_daemon_with_gdb.sh "$OS_TAG"
            ulimit -c unlimited

            # start appmesh
            /opt/appmesh/script/appmesh.initd.sh start
            sleep 5
            appc ls
            appc resource

            # test appmesh golang sdk
            apt install -y wget
            GO_ARCH=amd64
            GO_VER=1.25.3
            wget https://golang.org/dl/go${GO_VER}.linux-${GO_ARCH}.tar.gz >/dev/null 2>&1
            tar -C /usr/local -xzf go${GO_VER}.linux-${GO_ARCH}.tar.gz
            cd /work/src/sdk/go
            /usr/local/go/bin/go test -v

            # test appmesh python sdk
            apt install -y python3 python3-pip
            python3 -m pip install --break-system-packages --upgrade appmesh pyotp
            bash /work/script/run_python_test_with_debug.sh /work/src/sdk/python/test/test_appmesh_client.py
            python3 /work/src/sdk/python/sample.py
            '

      - name: test ubuntu:18
        env:
          OS_TAG: ubuntu18
        run: |
          docker run --rm -e OS_TAG \
            -v ${{ github.workspace }}:/work \
            -v /tmp/host-cores:/cores \
            --ulimit core=-1 \
            --cap-add SYS_PTRACE \
            --entrypoint=bash \
            ubuntu:18.04 \
            -c '
            apt update
            apt install -y wget iputils-ping gdb
            wget --quiet --no-check-certificate https://github.com/laoshanxi/app-mesh/releases/download/${{ env.APPMESH_VERSION }}/appmesh_2.2.1_gcc_7_glibc_2.27_x86_64.deb
            apt install -y ./appmesh_*.deb

            cp -a /opt/appmesh/bin/appsvc "/cores/appsvc.${OS_TAG}.bin" || true
            bash /work/script/wrap_daemon_with_gdb.sh "$OS_TAG"
            ulimit -c unlimited

            # start appmesh
            /opt/appmesh/script/appmesh.initd.sh start
            sleep 5
            appc ls
            appc resource

            # test appmesh golang sdk
            apt install -y wget
            GO_ARCH=amd64
            GO_VER=1.25.3
            wget https://golang.org/dl/go${GO_VER}.linux-${GO_ARCH}.tar.gz >/dev/null 2>&1
            tar -C /usr/local -xzf go${GO_VER}.linux-${GO_ARCH}.tar.gz
            cd /work/src/sdk/go
            /usr/local/go/bin/go test -v

            # test appmesh python sdk
            apt install -y python3 python3-pip
            python3 -m pip install --upgrade appmesh pyotp
            bash /work/script/run_python_test_with_debug.sh /work/src/sdk/python/test/test_appmesh_client.py
            python3 /work/src/sdk/python/sample.py
            '

      - name: test centos:7
        env:
          OS_TAG: centos7
        run: |
          docker run --rm -e OS_TAG \
            -v ${{ github.workspace }}:/work \
            -v /tmp/host-cores:/cores \
            --ulimit core=-1 \
            --cap-add SYS_PTRACE \
            --entrypoint=bash \
            centos:7 \
            -c '
            # centos 7
            cp -a /etc/yum.repos.d /etc/yum.repos.d.backup
            rm -f /etc/yum.repos.d/*.repo
            curl -o /etc/yum.repos.d/CentOS-Base.repo http://mirrors.aliyun.com/repo/Centos-7.repo
            yum clean all
            yum makecache

            yum install -y https://github.com/laoshanxi/app-mesh/releases/download/${{ env.APPMESH_VERSION }}/appmesh_2.2.1_gcc_4.8.5_glibc_2.17_x86_64.rpm
            yum install -y gdb

            cp -a /opt/appmesh/bin/appsvc "/cores/appsvc.${OS_TAG}.bin" || true
            bash /work/script/wrap_daemon_with_gdb.sh "$OS_TAG"
            ulimit -c unlimited

            # start appmesh
            /opt/appmesh/script/appmesh.initd.sh start
            sleep 5
            appc ls
            appc resource

            # test appmesh golang sdk
            yum install -y wget
            GO_ARCH=amd64
            GO_VER=1.25.3
            wget https://golang.org/dl/go${GO_VER}.linux-${GO_ARCH}.tar.gz >/dev/null 2>&1
            tar -C /usr/local -xzf go${GO_VER}.linux-${GO_ARCH}.tar.gz
            cd /work/src/sdk/go
            /usr/local/go/bin/go test -v

            # test appmesh python sdk
            yum install -y python3 python3-pip
            python3 -m pip install --upgrade appmesh pyotp
            bash /work/script/run_python_test_with_debug.sh /work/src/sdk/python/test/test_appmesh_client.py
            python3 /work/src/sdk/python/sample.py
            '

      - name: Upload core dumps
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appmesh-cores
          path: |
            /tmp/host-cores/core.*
            /tmp/host-cores/appsvc.*.bin
          if-no-files-found: ignore
          retention-days: 7