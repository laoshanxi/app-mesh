name: "release-windows"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-windows.yml"
      - "src/**"
      - "script/**"

permissions: read-all

env:
  APPMESH_VERSION: "2.2.1"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set PowerShell Execution Policy
        shell: pwsh
        run: Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser

      - name: Setup Build Environment
        shell: pwsh
        run: .\script\bootstrap\install_build_deps.ps1

      - name: Build binaries
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build build --parallel --config Release --target agent
          cmake --build build --parallel --config Release --target appm
          cmake --build build --parallel --config Release --target appsvc
          cmake --build build --parallel --config Release --target install

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build package
        shell: pwsh
        run: .\script\pack\build_package.ps1

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-${{ github.sha }}
          path: build/appmesh_*.exe

  test:
    needs: build
    runs-on: windows-2022
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: windows-${{ github.sha }}

      - run: choco install 7zip -y
      - run: python -m pip install --upgrade --no-user appmesh pyotp

      - name: Run tests
        shell: pwsh
        run: |
          # Install package
          7z x .\appmesh_2.2.1_windows_x64.exe -oC:\local\appmesh
          ls "C:\local\appmesh"
          Push-Location
          & "C:\local\appmesh\ssl\generate_ssl_cert.ps1"
          Pop-Location

          # Start service
          C:\local\appmesh\bin\nssm.exe install AppMeshService "C:\local\appmesh\bin\appsvc.exe"
          C:\local\appmesh\bin\nssm.exe set AppMeshService Start SERVICE_AUTO_START
          C:\local\appmesh\bin\nssm.exe start AppMeshService

          Start-Sleep -Seconds 2
          #Start-Process -FilePath "C:\local\appmesh\bin\appsvc.exe" -WindowStyle Hidden
          #Start-Sleep -Seconds 2

          ls "C:\local\appmesh"
          cat "C:\local\appmesh\work\server.log"

          C:\local\appmesh\bin\appm -V
          & "C:\local\appmesh\bin\appm.exe" ls
          & "C:\local\appmesh\bin\appm.exe" resource

          ls "C:\local\appmesh\work\stdout"
          cat "C:\local\appmesh\work\stdout\*.out"

          # TODO: ping not work on github action windows host, consider to use curl
          #python src\sdk\python\test\test_appmesh_client.py
          python src\sdk\python\sample.py

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "appmesh_*.exe"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.10.1 # TODO: Renovate will pin to SHA

      - name: Cosign keyless sign release artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Filter "appmesh_*.exe" | ForEach-Object {
            cosign sign-blob --yes `
              --bundle "$($_.Name).bundle" `
              $_.Name
            if ($LASTEXITCODE -ne 0) { throw "cosign failed for $($_.Name)" }
          }

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: "Security"
          tag_name: ${{ env.APPMESH_VERSION }}
          fail_on_unmatched_files: false
          token: ${{ secrets.PUBLISH_RELEASE }}
          files: |
            appmesh_*.exe
            appmesh_*.exe.bundle
