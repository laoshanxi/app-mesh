name: "release-sdk-python"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/sdk/python/**"
      - .github/workflows/release-sdk-python.yml

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Github code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build setuptools
          pip install twine wheel requests

      - name: Build package
        run: |
          python -m build --wheel --outdir dist
        working-directory: src/sdk/python

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: src/sdk/python/dist
# https://github.com/actions/starter-workflows/blob/main/ci/python-publish.yml
