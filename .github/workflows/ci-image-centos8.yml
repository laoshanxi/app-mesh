name: "ci-image-centos8"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci-image-centos8.yml"
      - "docker/Dockerfile.build_centos8"
      - "script/setup_build_env/autogen.sh"

env:
  REGISTRY: docker.io
  IMAGE_NAME: laoshanxi/appmesh

permissions:
  contents: read

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2
        with:
          egress-policy: audit

      - name: Checkout Github code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and Push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: docker/Dockerfile.build_centos8
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build_centos8
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build_centos8
          cache-to: type=inline
          provenance: false
