# Template for a Scenario B (interactive, streaming) session worker App.
#
# An admin provisions one per interactive session: it runs llm_agent in
# --session-worker mode, serving exactly one session over its own clean stdout (a
# client subscribing to its STDOUT sees only this session's tokens). behavior
# exit=remove makes the daemon remove the App whenever the worker exits (explicit
# session_close, idle/lifetime reap, or crash).
#
# No daemon credentials needed. Use the SAME `working_dir` and tenant as the
# Scenario A App so LLMAGENT_LEDGER_DIR below resolves to the SAME file
# (<dir>/<tenant>.ledger.json) and the two SHARE one per-tenant quota — sharing
# requires the same tenant AND the same ledger dir.
#
# `owner` MUST be an existing daemon user; it is the session owner (only that user
# or an admin may use the session). Substitute the session id (S1), owner, tenant,
# backend, then:  appm add -D @config/llm-agent-worker.yaml
# The client then talks to this App directly: run_task("llm-agent-sess-S1",
# {"action":"session_send","session_id":"S1","token":"<jwt>","stream":true}) + Subscribe(STDOUT).

name: llm-agent-sess-S1                          # convention: <Scenario-A-app>-sess-<id> (default: llm-agent-sess-<id>; tenant: llm-agent-<tenant>-sess-<id>)
owner: admin                                     # session owner — must be an existing daemon user
permission: 11                                   # access gate set by the provisioning client. The daemon's
#                                                  owner-permission — NOT the agent's L2 check — decides who may
#                                                  run_task/subscribe to this worker. Encoding: ones digit = group,
#                                                  tens digit = other; 1=deny 2=read 3=write. 11 = owner(+admin) only;
#                                                  0/unset = NO owner-scoping (anyone the RBAC role allows). Keep it
#                                                  restrictive so only the session owner reaches their worker.
working_dir: /opt/appmesh/lib/llm-agent          # REQUIRED edit: dir containing the llm_agent package (SAME as the Scenario A App)
command: python3 -m llm_agent --session-worker --session-id=S1 --server=127.0.0.1:6059
description: llm-agent interactive session worker (tenant=default session=S1)
stdout_cache_num: 1000                           # let a late STDOUT subscriber still see recent tokens
behavior:
  exit: remove
env:
  APPMESH_SESSION_OWNER: admin                   # must equal `owner`
  APPMESH_TENANT: default                         # same tenant as the Scenario A App → shared quota
  LLMAGENT_BACKEND: fake
  LLMAGENT_SESSION_DIR: ./llm-agent-workspace/default/S1/sessions
  LLMAGENT_WORKSPACE_DIR: ./llm-agent-workspace
  LLMAGENT_LEDGER_DIR: ./llm-agent-sessions       # MUST match the Scenario A App → one quota
  LLMAGENT_SESSION_IDLE_MINUTES: "30"
  LLMAGENT_SESSION_MAX_HOURS: "8"
status: 1
