# Pre-installed App definition for llm-agent — the shared handler (Scenario A, batch/DAG).
# The daemon auto-loads it on boot but does NOT start it (status: 0); enable on demand:
#   appm enable -a llm-agent
#
# It runs the Claude Agent SDK (Claude-only), so two things are required at runtime:
#   - ANTHROPIC_API_KEY as a SECURED env var (never in this file), e.g.:
#       appm add -a llm-agent -z ANTHROPIC_API_KEY=<key> -e LLMAGENT_MODEL=claude-opus-4-8
#     (Bedrock/Vertex instead: set the usual CLAUDE_CODE_USE_BEDROCK / _VERTEX env.)
#   - the `claude-agent-sdk` wheel (in requirements.txt) bundles the Claude Code CLI it
#     drives as a subprocess — no Node.js needed.
#
# `working_dir` must contain the llm_agent package and have `claude-agent-sdk` importable.
name: llm-agent
owner: admin
description: llm-agent — Claude Agent SDK handler (shared, Scenario A)
working_dir: /opt/appmesh/lib/llm-agent          # packaged-install location; EDIT for a custom prefix
command: python3 -m llm_agent --server 127.0.0.1:6059
behavior:
  exit: restart
env:
  LLMAGENT_WORKSPACE_DIR: ./llm-agent-workspace
  # Optional: LLMAGENT_MODEL (e.g. claude-opus-4-8), LLMAGENT_SYSTEM_PROMPT,
  #           LLMAGENT_ALLOWED_TOOLS, LLMAGENT_PERMISSION_MODE, LLMAGENT_MAX_ITERATIONS.
metadata:
  type: llm-agent-system
status: 0
